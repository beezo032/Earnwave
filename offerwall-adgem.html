<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EarnWave | AdGem Offerwall</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        .offerwall-frame {
            width: 100%;
            height: calc(100vh - 40px);
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">EarnWave</div>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="offers.html">Offers</a>
    <a href="withdraw.html">Withdraw</a>
    <a href="profile.html">Profile</a>
    <a href="login.html">Login</a>
    <a href="register.html">Sign Up</a>
</div>

<div class="main">
    <h1>AdGem Offerwall</h1>
    <p id="userInfo" style="opacity:0.8; margin-bottom:10px;"></p>

    <div class="card" style="padding:0; margin-top:20px;">
        <iframe id="adgemFrame" class="offerwall-frame"></iframe>
    </div>
</div>

<script>
const ADGEM_BASE_URL = "PASTE_YOUR_ADGEM_BASE_URL_HERE";
https://api.adgem.com/v1/wall?appid=31542&playerid=

async function loadAdGem() {
    const info = document.getElementById("userInfo");
    const frame = document.getElementById("adgemFrame");

    try {
        const res = await fetch("/api/me");

        if (!res.ok) {
            info.innerHTML = "You must <a href='login.html' style='color:#4fc3ff;'>login</a> to use the offerwall.";
            frame.style.display = "none";
            return;
        }

        const data = await res.json();
        const user = data.user;

        info.innerHTML = "Logged in as: <strong style='color:#4fc3ff;'>" + user.username + "</strong>";

        const url = ADGEM_BASE_URL + encodeURIComponent(user.id);
        frame.src = url;

    } catch (err) {
        console.error(err);
        info.textContent = "Error loading offerwall.";
    }
}

loadAdGem();
</script>

</body>
</html>
