<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EarnWave | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">EarnWave</div>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="offers.html">Offers</a>
    <a href="withdraw.html">Withdraw</a>
    <a href="profile.html">Profile</a>
    <a href="login.html">Login</a>
    <a href="register.html">Sign Up</a>
</div>

<div class="main">
    <h1>Login</h1>

    <div class="card" style="max-width: 400px; margin-top: 20px;">
        <form id="loginForm">
            <label>Email</label><br>
            <input type="email" id="loginEmail" required
                   style="width:100%; padding:10px; margin:8px 0; border-radius:6px; border:none;">
            <br>

            <label>Password</label><br>
            <input type="password" id="loginPassword" required
                   style="width:100%; padding:10px; margin:8px 0; border-radius:6px; border:none;">
            <br>

            <button type="submit">Login</button>
        </form>

        <p id="loginMessage" style="margin-top:10px; color:#ffb3b3;"></p>

        <p style="margin-top:15px;">
            Don't have an account?
            <a href="register.html" style="color:#4fc3ff;">Sign up here</a>
        </p>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    const msg = document.getElementById("loginMessage");
    msg.textContent = "";

    try {
        const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            msg.textContent = data.error || "Login failed.";
            return;
        }

        msg.style.color = "#93f5ff";
        msg.textContent = "Login successful! Redirecting...";
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 800);

    } catch (err) {
        console.error(err);
        msg.textContent = "Network error.";
    }
});
</script>

</body>
</html>
